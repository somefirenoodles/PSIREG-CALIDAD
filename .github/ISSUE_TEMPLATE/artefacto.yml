name: Artefacto VSEST-Lite
description: Registrar un producto de trabajo del proceso de calidad
title: "[ARTEFACTO] "
labels: ["artefacto"]
body:
  - type: input
    id: codigo
    attributes:
      label: Codigo
      placeholder: ART-001
    validations:
      required: true

  - type: input
    id: modulo
    attributes:
      label: Modulo
      placeholder: Trazabilidad
    validations:
      required: true

  - type: input
    id: fase
    attributes:
      label: Fase
      placeholder: Identificacion
    validations:
      required: true

  - type: input
    id: estado
    attributes:
      label: Estado
      placeholder: Pendiente
    validations:
      required: true

  - type: input
    id: evidencia
    attributes:
      label: Evidencia
      placeholder: docs/02_trazabilidad/matriz_ejecucion.md

  - type: textarea
    id: observacion
    attributes:
      label: Observacion
      placeholder: Describa observaciones o pendientes.
